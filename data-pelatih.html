<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Data Pembina</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div id="navbar"></div>


    <main class="container-fluid py-5">


        <div class="container">


            <div class="d-flex justify-content-between align-items-center mb-4">


                <h3 class="fw-bold">

                    Data Pembina

                </h3>


                <span class="badge text-bg-primary" id="totalData">

                    0 Data

                </span>


            </div>


            <div class="card p-3 mb-4">


                <div class="row g-2">


                    <div class="col-md-10">


                        <input type="text" id="search" class="form-control"
                            placeholder="Cari nama, NTA, alamat atau nomor HP...">

                    </div>


                    <div class="col-md-2">


                        <button class="btn btn-primary w-100" onclick="resetSearch()">

                            Reset

                        </button>


                    </div>


                </div>


            </div>


            <div id="loading" class="loading">


                <div class="spinner-border text-primary">

                </div>


                <p class="mt-3">

                    Mengambil data...

                </p>


            </div>


            <div id="error" class="alert alert-danger d-none">

            </div>


            <div id="tableContainer" class="card d-none">


                <div class="table-responsive">


                    <table class="table table-hover table-bordered mb-0">


                        <thead class="table-light">


                            <tr>

                                <th>No</th>

                                <th>Foto</th>

                                <th>Nama</th>

                                <th>TTL</th>

                                <th>NTA</th>

                                <th>Alamat</th>

                                <th>No HP</th>

                                <th>KMD</th>

                                <th>KML</th>

                                <th>KPD</th>

                                <th>KPL</th>

                                <th>Ukuran Baju</th>

                                <th>Ukuran Sepatu</th>

                                <th>Ukuran Topi</th>

                                <th>Aksi</th>

                            </tr>


                        </thead>


                        <tbody id="dataTable">

                        </tbody>


                    </table>


                </div>


            </div>


            <nav class="mt-4">


                <ul class="pagination justify-content-center" id="pagination">

                </ul>


            </nav>


        </div>


    </main>


    <script src="assets/js/config.js"></script>

    <script src="assets/js/auth.js"></script>


    <script>

        cekLogin();

    </script>


    <script src="assets/js/api.js"></script>

    <script src="assets/js/navbar.js"></script>

    <script src="assets/js/data-pelatih.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

    </script>


</body>

</html>
