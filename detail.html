<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Detail Pembina</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div id="navbar"></div>


    <main class="container py-5">


        <div id="loading" class="text-center">


            <div class="spinner-border text-primary">

            </div>


            <p class="mt-3">

                Mengambil data...

            </p>


        </div>


        <div id="error" class="alert alert-danger d-none">

        </div>


        <div id="detail" class="d-none">


            <div class="d-flex justify-content-between align-items-center mb-4">


                <h3 class="fw-bold">

                    Detail Pembina

                </h3>


                <a href="data-pelatih.html" class="btn btn-secondary">

                    Kembali

                </a>


            </div>


            <div class="card shadow-sm">


                <div class="card-body">


                    <div class="row g-4">


                        <div class="col-md-3 text-center">


                            <img id="foto" src="" class="img-fluid rounded shadow-sm" style="
                                    width: 200px;
                                    height: 250px;
                                    object-fit: cover;
                                ">


                            <p id="fotoTidakAda" class="text-muted d-none mt-3">

                                Foto tidak tersedia

                            </p>


                        </div>


                        <div class="col-md-9">


                            <h4 id="nama" class="fw-bold mb-4">

                            </h4>


                            <div class="row">


                                <div class="col-md-6">


                                    <table class="table">


                                        <tr>

                                            <th>ID</th>

                                            <td id="id"></td>

                                        </tr>


                                        <tr>

                                            <th>TTL</th>

                                            <td id="ttl"></td>

                                        </tr>


                                        <tr>

                                            <th>NTA</th>

                                            <td id="nta"></td>

                                        </tr>


                                        <tr>

                                            <th>No HP</th>

                                            <td id="nohp"></td>

                                        </tr>


                                        <tr>

                                            <th>Alamat</th>

                                            <td id="alamat"></td>

                                        </tr>


                                    </table>


                                </div>


                                <div class="col-md-6">


                                    <table class="table">


                                        <tr>

                                            <th>KMD</th>

                                            <td id="kmd"></td>

                                        </tr>


                                        <tr>

                                            <th>KML</th>

                                            <td id="kml"></td>

                                        </tr>


                                        <tr>

                                            <th>KPD</th>

                                            <td id="kpd"></td>

                                        </tr>


                                        <tr>

                                            <th>KPL</th>

                                            <td id="kpl"></td>

                                        </tr>


                                    </table>


                                </div>


                            </div>


                        </div>


                    </div>


                    <hr>


                    <h5 class="fw-bold mb-3">

                        Ukuran Perlengkapan

                    </h5>


                    <div class="row g-3">


                        <div class="col-md-4">


                            <div class="stat-card text-center">


                                <small>

                                    Ukuran Baju

                                </small>


                                <h3 id="baju" class="fw-bold">

                                </h3>


                            </div>


                        </div>


                        <div class="col-md-4">


                            <div class="stat-card text-center">


                                <small>

                                    Ukuran Sepatu

                                </small>


                                <h3 id="sepatu" class="fw-bold">

                                </h3>


                            </div>


                        </div>


                        <div class="col-md-4">


                            <div class="stat-card text-center">


                                <small>

                                    Ukuran Topi

                                </small>


                                <h3 id="topi" class="fw-bold">

                                </h3>


                            </div>


                        </div>


                    </div>


                </div>


            </div>


        </div>


    </main>


    <script src="assets/js/config.js"></script>

    <script src="assets/js/auth.js"></script>


    <script>

        cekLogin();

    </script>


    <script src="assets/js/api.js"></script>

    <script src="assets/js/navbar.js"></script>

    <script src="assets/js/detail.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

    </script>

</html>
