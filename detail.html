<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Detail Pembina</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


    <div id="navbar"></div>


    <main class="container py-5">


        <div id="loading" class="text-center">

            <div class="spinner-border text-primary">

            </div>


            <p class="mt-3">

                Mengambil data...

            </p>

        </div>


        <div id="error" class="alert alert-danger d-none">

        </div>


        <div id="detail" class="d-none">


            <div class="d-flex justify-content-between align-items-center mb-4">

                <h3 class="fw-bold">

                    Detail Pembina

                </h3>


                <a href="data-pelatih.html" class="btn btn-secondary">

                    Kembali

                </a>

            </div>


            <div class="card shadow-sm">


                <div class="card-body">


                    <div class="row g-4">


                        <!-- FOTO -->

                        <div class="col-md-3 text-center">


                            <img id="foto" src="" class="img-fluid rounded shadow-sm" style="
                                    width: 200px;
                                    height: 250px;
                                    object-fit: cover;
                                ">


                            <p id="fotoTidakAda" class="text-muted d-none mt-3">

                                Foto tidak tersedia

                            </p>

                        </div>


                        <!-- DATA DIRI -->

                        <div class="col-md-9">


                            <h4 id="nama" class="fw-bold mb-4">

                            </h4>


                            <div class="row">


                                <div class="col-md-6">

                                    <table class="table">


                                        <tr>

                                            <th width="150">

                                                ID

                                            </th>

                                            <td id="id">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                TTL

                                            </th>

                                            <td id="ttl">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                NTA

                                            </th>

                                            <td id="nta">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                No HP

                                            </th>

                                            <td id="nohp">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                Alamat

                                            </th>

                                            <td id="alamat">

                                            </td>

                                        </tr>


                                    </table>

                                </div>


                                <div class="col-md-6">


                                    <table class="table">



                                        <tr>

                                            <th>

                                                KMD

                                            </th>

                                            <td id="kmd">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                KML

                                            </th>

                                            <td id="kml">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                KPD

                                            </th>

                                            <td id="kpd">

                                            </td>

                                        </tr>


                                        <tr>

                                            <th>

                                                KPL

                                            </th>

                                            <td id="kpl">

                                            </td>

                                        </tr>

                                    </table>

                                </div>

                            </div>


                        </div>

                    </div>


                    <hr>


                    <!-- UKURAN SERAGAM -->

                    <h5 class="fw-bold mb-3">

                        Ukuran Perlengkapan

                    </h5>


                    <div class="row g-3">


                        <div class="col-md-4">


                            <div class="stat-card text-center">

                                <small>

                                    Ukuran Baju

                                </small>


                                <h3 id="baju" class="fw-bold">

                                </h3>

                            </div>

                        </div>


                        <div class="col-md-4">


                            <div class="stat-card text-center">

                                <small>

                                    Ukuran Sepatu

                                </small>


                                <h3 id="sepatu" class="fw-bold">

                                </h3>

                            </div>

                        </div>


                        <div class="col-md-4">


                            <div class="stat-card text-center">

                                <small>

                                    Ukuran Topi

                                </small>


                                <h3 id="topi" class="fw-bold">

                                </h3>

                            </div>

                        </div>


                    </div>


                </div>

            </div>

        </div>


    </main>


    <script src="assets/js/config.js"></script>

    <script src="assets/js/api.js"></script>

    <script src="assets/js/navbar.js"></script>


    <script>

        document.addEventListener(

            'DOMContentLoaded',

            loadDetail

        );


        async function loadDetail() {


            const params =

                new URLSearchParams(

                    window.location.search

                );


            const id =

                params.get('id');


            if (!id) {

                showError(

                    'ID data tidak ditemukan'

                );

                return;

            }


            try {


                const result =

                    await getData('data');


                const data =

                    result.data.find(

                        item =>

                            String(item.ID) === String(id)

                    );


                if (!data) {

                    showError(

                        'Data tidak ditemukan'

                    );

                    return;

                }


                tampilkanData(data);


            } catch (error) {


                showError(error.message);


            }

        }


        function tampilkanData(data) {


            document.getElementById(

                'loading'

            ).classList.add('d-none');


            document.getElementById(

                'detail'

            ).classList.remove('d-none');


            document.getElementById(

                'id'

            ).innerText = data.ID || '-';


            document.getElementById(

                'nama'

            ).innerText = data.Nama || '-';


            document.getElementById(

                'ttl'

            ).innerText = data.TTL || '-';


            document.getElementById(

                'nta'

            ).innerText = data.NTA || '-';


            document.getElementById(

                'nohp'

            ).innerText = data['No HP'] || '-';


            document.getElementById(

                'alamat'

            ).innerText = data.Alamat || '-';


            document.getElementById(

                'kmd'

            ).innerText = data.KMD || '-';


            document.getElementById(

                'kml'

            ).innerText = data.KML || '-';


            document.getElementById(

                'kpd'

            ).innerText = data.KPD || '-';


            document.getElementById(

                'kpl'

            ).innerText = data.KPL || '-';


            document.getElementById(

                'baju'

            ).innerText = data['Ukuran Baju'] || '-';


            document.getElementById(

                'sepatu'

            ).innerText = data['Ukuran Sepatu'] || '-';


            document.getElementById(

                'topi'

            ).innerText = data['Ukuran Topi'] || '-';


            const foto =

                document.getElementById('foto');


            const fotoTidakAda =

                document.getElementById(

                    'fotoTidakAda'

                );


            if (data.Foto) {


                foto.src = data.Foto;


                foto.classList.remove(

                    'd-none'

                );


                fotoTidakAda.classList.add(

                    'd-none'

                );


            } else {


                foto.classList.add(

                    'd-none'

                );


                fotoTidakAda.classList.remove(

                    'd-none'

                );

            }

        }


        function showError(message) {


            document.getElementById(

                'loading'

            ).classList.add('d-none');


            const error =

                document.getElementById('error');


            error.classList.remove('d-none');


            error.innerText = message;

        }

    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

    </script>


</body>

</html>
